site_name: Flechtwerk
site_description: Truly async Python stream processing with real Kafka transactions for exactly-once delivery.
site_url: https://bsure-analytics.github.io/flechtwerk/
site_author: Christian Schlichtherle
copyright: Copyright &copy; b.sure GmbH — MIT licensed
repo_url: https://github.com/bsure-analytics/flechtwerk
repo_name: bsure-analytics/flechtwerk
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  font:
    text: EB Garamond
    code: JetBrains Mono
  palette:
    - scheme: parchment
      toggle:
        icon: material/weather-night
        name: Read by candlelight
    - scheme: vellum
      toggle:
        icon: material/weather-sunny
        name: Read by daylight
  features:
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/manuscript.css

hooks:
  - hooks/chapters.py

plugins:
  - search
  - privacy # self-hosts external assets (Google Fonts) at build time — no third-party runtime fetch
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_section_style: table
            heading_level: 3
            members_order: source
            separate_signature: true
            show_root_heading: true
            show_signature_annotations: true
            show_source: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Concepts:
      - concepts/index.md
      - Architecture: concepts/architecture.md
      - Exactly-once delivery: concepts/exactly-once.md
  - Guides:
      - guides/index.md
      - Getting started: guides/getting-started.md
  - API reference: api/index.md
